components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
          default: false
          readOnly: true
        image:
          type: string
        createdAt:
          type: string
          format: date-time
          default: Generated at runtime
        updatedAt:
          type: string
          format: date-time
          default: Generated at runtime
        role:
          type: string
          readOnly: true
        banned:
          type: boolean
          default: false
          readOnly: true
        banReason:
          type: string
          readOnly: true
        banExpires:
          type: string
          format: date-time
          readOnly: true
      required:
        - name
        - email
        - createdAt
        - updatedAt
    Session:
      type: object
      properties:
        id:
          type: string
        expiresAt:
          type: string
          format: date-time
        token:
          type: string
        createdAt:
          type: string
          format: date-time
          default: Generated at runtime
        updatedAt:
          type: string
          format: date-time
        ipAddress:
          type: string
        userAgent:
          type: string
        userId:
          type: string
        impersonatedBy:
          type: string
        activeOrganizationId:
          type: string
      required:
        - expiresAt
        - token
        - createdAt
        - updatedAt
        - userId
    Account:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        providerId:
          type: string
        userId:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        idToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
        scope:
          type: string
        password:
          type: string
        createdAt:
          type: string
          format: date-time
          default: Generated at runtime
        updatedAt:
          type: string
          format: date-time
      required:
        - accountId
        - providerId
        - userId
        - createdAt
        - updatedAt
    Verification:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
        value:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
          default: Generated at runtime
        updatedAt:
          type: string
          format: date-time
          default: Generated at runtime
      required:
        - identifier
        - value
        - expiresAt
        - createdAt
        - updatedAt
    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: string
      required:
        - name
        - slug
        - createdAt
    Member:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        userId:
          type: string
        role:
          type: string
          default: member
        createdAt:
          type: string
          format: date-time
      required:
        - organizationId
        - userId
        - role
        - createdAt
    Invitation:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
          default: pending
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
          default: Generated at runtime
        inviterId:
          type: string
      required:
        - organizationId
        - email
        - status
        - expiresAt
        - createdAt
        - inviterId
  securitySchemes:
    apiKeyCookie:
      type: apiKey
      in: cookie
      name: apiKeyCookie
      description: API Key authentication via cookie
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication
